<!DOCTYPE html>
<html>
<head>
  <title>Auth App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .btn-outline-primary:hover {
      background-color: #667eea;
      color: white;
    }
    button {
      cursor: pointer;
    }
    .card {
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .btn-custom {
      background-color: #667eea;
      color: white;
    }
    .btn-custom:hover {
      background-color: #5a67d8;
    }

    .profile-details-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #0406129a;
      margin-bottom: 8px;
      padding-left: 4px;
    }
    .profile-detail-box {
      background: linear-gradient(135deg, #f8f5fa, #e8ecf1);
      border-radius: 12px;
      padding: 18px 22px;
      margin-bottom: 16px;
    }
    .profile-detail-box .detail-item {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #dde2ea;
    }
    .profile-detail-box .detail-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .profile-detail-box .detail-item:first-child {
      padding-top: 0;
    }
    .profile-detail-box .detail-label {
      font-weight: 700;
      color: #102375;
      font-size: 1rem;
      width: 110px;
      flex-shrink: 0;
    }
    .profile-detail-box .detail-value {
      color: #222;
      font-size: 1rem;
      font-weight: 500;
    }
    .empty {
      color: #bbb;
      font-style: italic;
      font-size: 0.88rem;
      font-weight: 400;
    }

    .btn-edit-small {
      background-color: #667eea;
      color: white;
      font-size: 0.82rem;
      padding: 6px 20px;
      border-radius: 20px;
      border: none;
      transition: background 0.2s;
      font-weight: 600;
    }
    .btn-edit-small:hover {
      background-color: #5a67d8;
      color: white;
    }
    .btn-update-small {
      background-color: #38a169;
      color: white;
      font-size: 0.82rem;
      padding: 6px 20px;
      border-radius: 20px;
      border: none;
      transition: background 0.2s;
      font-weight: 600;
    }
    .btn-update-small:hover {
      background-color: #2f855a;
      color: white;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <div class="card p-4 mb-4" id="authSection">

        <div class="d-flex mb-3">
          <button id="loginBtn" class="btn btn-primary w-50" onclick="showLogin()">Login</button>
          <button id="signupBtn" class="btn btn-outline-primary w-50" onclick="showSignup()">Signup</button>
        </div>

        <div id="loginForm">
          <input id="li_user" class="form-control mb-2" placeholder="Username">
          <input id="li_pass" class="form-control mb-2" type="password" placeholder="Password">
          <button class="btn btn-success w-100" onclick="login()">Login</button>
        </div>

        <div id="signupForm" style="display:none;">
          <input id="su_user" class="form-control mb-2" placeholder="Username">
          <input id="su_pass" class="form-control mb-2" type="password" placeholder="Password">
          <input id="su_confirm_pass" class="form-control mb-2" type="password" placeholder="Confirm Password">
          <button class="btn btn-custom w-100" onclick="signup()">Signup</button>
        </div>

      </div>

      <div class="card p-4" id="profileSection" style="display:none;">

        <h4 class="text-center mb-3" id="welcomeMsg"></h4>

        <!-- PROFILE DETAILS TITLE + EDIT BUTTON on same line -->
        <div class="d-flex justify-content-between align-items-center mb-1">
          <span class="profile-details-title">📋 Profile Details</span>
          <button id="editUpdateBtn" class="btn-edit-small" onclick="handleEditUpdate()">
            ✏️ Edit Profile
          </button>
        </div>

        <div class="profile-detail-box">
          <div class="detail-item">
            <span class="detail-label">👤 Username</span>
            <span class="detail-value" id="detail_username"><span class="empty">Not set</span></span>
          </div>
          <div class="detail-item">
            <span class="detail-label">💼 Role</span>
            <span class="detail-value" id="detail_role"><span class="empty">Not set</span></span>
          </div>
          <div class="detail-item">
            <span class="detail-label">📍 Location</span>
            <span class="detail-value" id="detail_location"><span class="empty">Not set</span></span>
          </div>
          <div class="detail-item">
            <span class="detail-label">🏢 Company</span>
            <span class="detail-value" id="detail_company"><span class="empty">Not set</span></span>
          </div>
        </div>

        <div id="profileInputs" style="display:none;" class="mt-1 mb-2">
          <input id="role" class="form-control mb-2" placeholder="Role" oninput="onTyping()">
          <input id="location" class="form-control mb-2" placeholder="Location" oninput="onTyping()">
          <input id="company" class="form-control mb-2" placeholder="Company" oninput="onTyping()">
        </div>

        <button class="btn btn-danger w-100 mt-2" onclick="logout()">Logout</button>
      </div>

      <div class="card p-3 mt-3">
        <div id="output"></div>
      </div>

    </div>
  </div>
</div>

<script>
const BASE_URL = "https://login-signup-page-8.onrender.com";

let token = localStorage.getItem('token') || "";
let isEditing = false;

window.onload = function() {
  if (token) {
    authSection.style.display = "none";
    profileSection.style.display = "block";

    const username = localStorage.getItem('username');
    if (username) {
      document.getElementById('welcomeMsg').textContent = `Welcome! ${username}`;
    }

    getProfile();
  }
};

function showLogin() {
  loginForm.style.display = "block";
  signupForm.style.display = "none";
  loginBtn.classList.add("btn-primary");
  loginBtn.classList.remove("btn-outline-primary");
  signupBtn.classList.add("btn-outline-primary");
  signupBtn.classList.remove("btn-primary");
}

function showSignup() {
  loginForm.style.display = "none";
  signupForm.style.display = "block";
  signupBtn.classList.add("btn-primary");
  signupBtn.classList.remove("btn-outline-primary");
  loginBtn.classList.add("btn-outline-primary");
  loginBtn.classList.remove("btn-primary");
}

function signup() {
  const username = su_user.value;
  const password = su_pass.value;
  const confirmPassword = su_confirm_pass.value;

  // 1. Check empty fields
  if (!username || !password || !confirmPassword) {
    output({ msg: "All fields are required!", type: "error" });
    return;
  }

  // 2. Check password match
  if (password !== confirmPassword) {
    output({ msg: "Passwords do not match!", type: "error" });
    return;
  }

  fetch("https://az-function-demo-fjdwcxagbzhvfpdq.centralindia-01.azurewebsites.net/api/hello")
  .then(res => res.json())
  .then(data => console.log(data))

  // 3. Send to backend
  fetch(`${BASE_URL}/signup`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      username: username,
      password: password
    })
  })
  .then(r => r.json())
  .then(d => output({ msg: d.msg }));
}

function login() {
  fetch(`${BASE_URL}/login`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      username: li_user.value,
      password: li_pass.value
    })
  })
  .then(r => r.json())
  .then(d => {
    if (!d.access_token) {
      output({ msg: d.msg || "Login failed", type: "error" });
      li_user.value = "";
      li_pass.value = "";
      return;
    }

    token = d.access_token;
    localStorage.setItem('token', token);

    const username = li_user.value;
    localStorage.setItem('username', username);
    document.getElementById('welcomeMsg').textContent = `Welcome! ${username}`;

    output({ msg: "Login successful ✅" });
    profileSection.style.display = "block";
    authSection.style.display = "none";

    getProfile();
  });
}

function getProfile() {
  fetch(`${BASE_URL}/profile`, {
    method: "GET",
    headers: { "Authorization": "Bearer " + token }
  })
  .then(r => r.json())
  .then(d => {
    if (d.msg && !d.username) {
      output({ msg: d.msg, type: "error" });
      return;
    }

    setDetail('detail_username', d.username);
    setDetail('detail_role', d.role);
    setDetail('detail_location', d.location);
    setDetail('detail_company', d.company);
  });
}

function setDetail(id, value) {
  const el = document.getElementById(id);
  if (value) {
    el.innerHTML = value;
  } else {
    el.innerHTML = `<span class="empty">Not set</span>`;
  }
}

function handleEditUpdate() {
  const btn = document.getElementById('editUpdateBtn');

  if (!isEditing) {
    document.getElementById('profileInputs').style.display = "block";

    btn.textContent = "💾 Save";
    btn.className = "btn-update-small";

    isEditing = true;
    return;
  }

  const role     = document.getElementById('role').value.trim();
  const location = document.getElementById('location').value.trim();
  const company  = document.getElementById('company').value.trim();

  if (!role && !location && !company) {
    output({ msg: "⚠️ Please fill at least one field!", type: "error" });
    return;
  }

  updateProfile();
}

function onTyping() {
  const btn = document.getElementById('editUpdateBtn');
  btn.textContent = "✅ Update Profile";
  btn.className = "btn-update-small";
}

function updateProfile() {
  const role     = document.getElementById('role').value.trim();
  const location = document.getElementById('location').value.trim();
  const company  = document.getElementById('company').value.trim();

  fetch(`${BASE_URL}/profile`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ role, location, company })
  })
  .then(r => r.json())
  .then(d => {
    output({ msg: "Profile updated successfully ✅" });

    // reset inputs
    document.getElementById('role').value = "";
    document.getElementById('location').value = "";
    document.getElementById('company').value = "";

    document.getElementById('profileInputs').style.display = "none";

    const btn = document.getElementById('editUpdateBtn');
    btn.textContent = "✏️ Edit Profile";
    btn.className = "btn-edit-small";

    isEditing = false;

    getProfile();
  });
}
function logout() {
  token = "";
  localStorage.removeItem('token');
  localStorage.removeItem('username');
  document.getElementById('welcomeMsg').textContent = "";

  isEditing = false;
  document.getElementById('profileInputs').style.display = "none";
  const btn = document.getElementById('editUpdateBtn');
  btn.textContent = "✏️ Edit Profile";
  btn.className = "btn-edit-small";

  setDetail('detail_username', '');
  setDetail('detail_role', '');
  setDetail('detail_location', '');
  setDetail('detail_company', '');

  profileSection.style.display = "none";
  authSection.style.display = "block";

  li_user.value = "";
  li_pass.value = "";
  su_user.value = "";
  su_pass.value = "";

  showLogin();
  output({ msg: "Logged out successfully" });
}

function output(data) {
  const outputDiv = document.getElementById('output');
  if (data.type === "error") {
    outputDiv.innerHTML = `<div class="alert alert-warning mb-0">${data.msg}</div>`;
  } else {
    outputDiv.innerHTML = `<div class="alert alert-success mb-0">${data.msg}</div>`;
  }
}
</script>

</body>
</html>
