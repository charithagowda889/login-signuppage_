<!DOCTYPE html>
<html>
<head>
  <title>Auth App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .btn-outline-primary:hover {
      background-color: #667eea;
      color: white;
    }
    button {
    cursor: pointer;
   } 

    .card {
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .btn-custom {
      background-color: #667eea;
      color: white;
    }
    .btn-custom:hover {
      background-color: #5a67d8;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <!-- AUTH SECTION -->
      <div class="card p-4 mb-4" id="authSection">


        <!-- Toggle Buttons -->
        <div class="d-flex mb-3">
          <button id="loginBtn" class="btn btn-primary w-50" onclick="showLogin()">Login</button>
          <button id="signupBtn" class="btn btn-outline-primary w-50" onclick="showSignup()">Signup</button>
          </div>

        <div id="loginForm">
          <input id="li_user" class="form-control mb-2" placeholder="Username">
          <input id="li_pass" class="form-control mb-2" type="password" placeholder="Password">
          <button class="btn btn-success w-100" onclick="login()">Login</button>
        </div>

        <!-- Signup -->
        <div id="signupForm" style="display:none;">
          <input id="su_user" class="form-control mb-2" placeholder="Username">
          <input id="su_pass" class="form-control mb-2" type="password" placeholder="Password">
          <button class="btn btn-custom w-100" onclick="signup()">Signup</button>
        </div>

      </div>

      <!-- PROFILE SECTION -->
      <div class="card p-4" id="profileSection" style="display:none;">
        <h4 class="text-center">Profile</h4>

        <button class="btn btn-info w-100 mb-2" onclick="getProfile()">Get Profile</button>

        <input id="role" class="form-control mb-2" placeholder="Role">
        <input id="location" class="form-control mb-2" placeholder="Location">
        <input id="company" class="form-control mb-2" placeholder="Company">

        <button class="btn btn-warning w-100" onclick="updateProfile()">Update Profile</button>

        <button class="btn btn-danger w-100 mt-2" onclick="logout()">Logout</button>
      </div>

      <!-- OUTPUT -->
      <div class="card p-3 mt-3">
        <div id="output"></div>
      </div>

    </div>
  </div>
</div>

<script>
const BASE_URL = "https://login-signup-page-4.onrender.com";

let token = localStorage.getItem('token') || "";

window.onload = function() {
  if (token) {
    authSection.style.display = "none";
    profileSection.style.display = "block";
  }
};

function showLogin() {
  loginForm.style.display = "block";
  signupForm.style.display = "none";

  // Active style
  loginBtn.classList.add("btn-primary");
  loginBtn.classList.remove("btn-outline-primary");

  // Inactive style
  signupBtn.classList.add("btn-outline-primary");
  signupBtn.classList.remove("btn-primary");

}


function showSignup() {
  loginForm.style.display = "none";
  signupForm.style.display = "block";

  // Active style
  signupBtn.classList.add("btn-primary");
  signupBtn.classList.remove("btn-outline-primary");

  // Inactive style
  loginBtn.classList.add("btn-outline-primary");
  loginBtn.classList.remove("btn-primary");

  
}

function signup() {
  fetch(`${BASE_URL}/signup`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      username: su_user.value,
      password: su_pass.value
    })
  })
  .then(r => r.json())
  // FIX: show the msg from server (covers both success and "User exists" error)
  .then(d => output({ msg: d.msg }));
}

function login() {
  fetch(`${BASE_URL}/login`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      username: li_user.value,
      password: li_pass.value
    })
  })
  .then(r => r.json())
  .then(d => {
    // FIX: check token exists before switching to profile view
    if (!d.access_token) {
      output({ msg: d.msg || "Login failed" });
      return;
    }

    token = d.access_token;
    // FIX: save token to localStorage
    localStorage.setItem('token', token);

    // Hide token from UI
    output({ msg: "Login successful" });

    profileSection.style.display = "block";
    authSection.style.display = "none";
  });
}

function getProfile() {
  fetch(`${BASE_URL}/profile`, {
    method: "GET",
    headers: {
      "Authorization": "Bearer " + token
    }
  })
  .then(r => r.json())
  .then(d => {
    // FIX: check for error response from server
    if (d.msg && !d.username) {
      output({ msg: d.msg });
      return;
    }

    // fill inputs
    role.value     = d.role     || "";
    location.value = d.location || "";
    company.value  = d.company  || "";

    // show only success-style output
    output({
      username: d.username,
      role:     d.role,
      location: d.location,
      company:  d.company
    });

  });
}

function updateProfile() {
  fetch(`${BASE_URL}/profile`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      role:     document.getElementById('role').value,
      location: document.getElementById('location').value,
      company:  document.getElementById('company').value
    })
  })
  .then(r => r.json())
  .then(d => {
    // FIX: backend now returns username/role/location/company along with msg
    // so we can display all fields correctly
    output({
      msg:      d.msg,
      username: d.username,
      role:     d.role,
      location: d.location,
      company:  d.company
    });

  });
}

function logout() {
  token = "";
  // FIX: clear token from localStorage on logout
  localStorage.removeItem('token');

  // Hide profile, show auth
  profileSection.style.display = "none";
  authSection.style.display = "block";

  // Clear login fields
  li_user.value = "";
  li_pass.value = "";

  // Clear signup fields
  su_user.value = "";
  su_pass.value = "";

  // Clear profile fields
  role.value = "";
  location.value = "";
  company.value = "";

  // Reset to login tab
  showLogin();

  output({ msg: "Logged out successfully" });
}

// Output 
function output(data) {
  let html = "";

  if (data.msg) {
    let profileHtml = "";
    if (data.username) {
      profileHtml = `
        <hr>
        <b>Username:</b> ${data.username || ""}<br>
        <b>Role:</b> ${data.role || ""}<br>
        <b>Location:</b> ${data.location || ""}<br>
        <b>Company:</b> ${data.company || ""}
      `;
    }
    html = `<div class="alert alert-success">${data.msg}</div>` + profileHtml;
  } else {
    html = `
      <div>
        <b>Username:</b> ${data.username || ""}<br>
        <b>Role:</b> ${data.role || ""}<br>
        <b>Location:</b> ${data.location || ""}<br>
        <b>Company:</b> ${data.company || ""}
      </div>
    `;
  }

  const outputDiv = document.getElementById('output');
  outputDiv.innerHTML = html;

}
</script>

</body>
</html>
