<!DOCTYPE html>
<html>
<head>
  <title>Auth App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .btn-custom {
      background-color: #667eea;
      color: white;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <!-- AUTH SECTION -->
      <div class="card p-4 mb-4" id="authSection">

        <div class="d-flex mb-3">
          <button class="btn btn-primary w-50" onclick="showLogin()">Login</button>
          <button class="btn btn-outline-primary w-50" onclick="showSignup()">Signup</button>
        </div>

        <!-- Login -->
        <div id="loginForm">
          <input id="li_user" class="form-control mb-2" placeholder="Username">
          <input id="li_pass" class="form-control mb-2" type="password" placeholder="Password">
          <button class="btn btn-success w-100" onclick="login()">Login</button>
        </div>

        <!-- Signup -->
        <div id="signupForm" style="display:none;">
          <input id="su_user" class="form-control mb-2" placeholder="Username">
          <input id="su_pass" class="form-control mb-2" type="password" placeholder="Password">
          <button class="btn btn-custom w-100" onclick="signup()">Signup</button>
        </div>

      </div>

      <!-- PROFILE SECTION -->
      <div class="card p-4" id="profileSection" style="display:none;">
        <h4 class="text-center">Profile</h4>

        <button class="btn btn-info w-100 mb-2" onclick="getProfile()">Get Profile</button>

        <input id="role" class="form-control mb-2" placeholder="Role">
        <input id="location" class="form-control mb-2" placeholder="Location">
        <input id="company" class="form-control mb-2" placeholder="Company">

        <button class="btn btn-warning w-100" onclick="updateProfile()">Update Profile</button>

        <button class="btn btn-danger w-100 mt-2" onclick="logout()">Logout</button>
      </div>

      <!-- OUTPUT -->
      <div class="card p-3 mt-3">
        <div id="output"></div>
      </div>

    </div>
  </div>
</div>

<script>
const BASE_URL = "https://login-signup-page-3-xjke.onrender.com";
let token = "";

function showLogin() {
  loginForm.style.display = "block";
  signupForm.style.display = "none";
}

function showSignup() {
  loginForm.style.display = "none";
  signupForm.style.display = "block";
}

function signup() {
  fetch(`${BASE_URL}/signup`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      username: su_user.value,
      password: su_pass.value
    })
  })
  .then(r => r.json())
  .then(d => output(d));
}

function login() {
  fetch(`${BASE_URL}/login`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      username: li_user.value,
      password: li_pass.value
    })
  })
  .then(r => r.json())
  .then(d => {
    token = d.access_token;

    // Hide token from UI
    output({ msg: "Login successful" });

    profileSection.style.display = "block";
    authSection.style.display = "none";
  });
}

function getProfile() {
  fetch(`${BASE_URL}/profile`, {
    headers: {
      'Authorization': 'Bearer ' + token
    }
  })
  .then(r => r.json())
  .then(d => output(d));
}

function updateProfile() {
  fetch(`${BASE_URL}/profile`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token
    },
    body: JSON.stringify({
      role: role.value,
      location: location.value,
      company: company.value
    })
  })
  .then(r => r.json())
  .then(d => output(d));
}

function logout() {
  token = "";

  // Hide profile, show auth
  profileSection.style.display = "none";
  authSection.style.display = "block";

  // Clear login fields
  li_user.value = "";
  li_pass.value = "";

  // Clear signup fields
  su_user.value = "";
  su_pass.value = "";

  // Clear profile fields
  role.value = "";
  location.value = "";
  company.value = "";

  // Reset to login tab
  showLogin();

  output({ msg: "Logged out successfully" });
}

// Output 
function output(data) {
  let html = "";

  if (data.msg) {
    html = `<div class="alert alert-success">${data.msg}</div>`;
  } else {
    html = `
      <div>
        <b>Username:</b> ${data.username || ""}<br>
        <b>Role:</b> ${data.role || ""}<br>
        <b>Location:</b> ${data.location || ""}<br>
        <b>Company:</b> ${data.company || ""}
      </div>
    `;
  }

  document.getElementById('output').innerHTML = html;
}
</script>

</body>
</html>
